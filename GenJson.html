<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReadPixel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Consolas','Courier New',monospace; background:#0f0f1a; color:#e0e0f0; min-height:100vh; display:flex; flex-direction:column; }

    header { background:#1a1a2e; border-bottom:2px solid #7c3aed; padding:12px 24px; display:flex; align-items:center; gap:12px; }
    header h1 { font-size:1.3rem; color:#a78bfa; letter-spacing:2px; }
    header span { font-size:0.75rem; color:#6b6b8a; }

    main { flex:1; padding:16px; display:flex; flex-direction:column; gap:14px; max-width:1400px; width:100%; margin:0 auto; }

    /* Drop zone */
    #drop-zone { border:2px dashed #4c1d95; border-radius:10px; padding:24px; text-align:center; cursor:pointer; transition:all 0.2s; background:#1a1a2e; color:#7c5cbf; }
    #drop-zone:hover, #drop-zone.drag-over { border-color:#7c3aed; background:#1e1b4b; color:#a78bfa; }
    #drop-zone p { font-size:0.95rem; margin-bottom:4px; }
    #drop-zone small { font-size:0.72rem; color:#6b6b8a; }
    #file-input { display:none; }

    /* Workspace */
    #workspace { display:none; gap:14px; }
    #workspace.visible { display:grid; grid-template-columns:1fr 330px; }

    /* Canvas panel */
    #canvas-panel { background:#1a1a2e; border-radius:10px; border:1px solid #2d2d4e; padding:12px; display:flex; flex-direction:column; gap:10px; }

    /* Mode tabs */
    #mode-tabs { display:flex; gap:0; border:1px solid #2d2d4e; border-radius:7px; overflow:hidden; width:fit-content; }
    .tab-btn { padding:5px 16px; background:#13132a; border:none; cursor:pointer; font-family:inherit; font-size:0.76rem; font-weight:600; color:#6b6b8a; transition:all 0.15s; border-right:1px solid #2d2d4e; }
    .tab-btn:last-child { border-right:none; }
    .tab-btn.active { background:#7c3aed; color:#fff; }
    .tab-btn:hover:not(.active) { background:#1e1b4b; color:#a78bfa; }

    /* Controls bar */
    .ctrl-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:#13132a; padding:8px 10px; border-radius:7px; border:1px solid #2d2d4e; }
    .ctrl-bar label { font-size:0.75rem; color:#9ca3af; display:flex; align-items:center; gap:4px; }
    .ctrl-bar input[type="number"] { width:52px; background:#0f0f1a; border:1px solid #3b3b5c; border-radius:4px; color:#e0e0f0; padding:2px 5px; font-family:inherit; font-size:0.78rem; text-align:center; }
    .sep { color:#3b3b5c; }

    /* Stepper */
    .stepper { display:flex; align-items:center; gap:2px; }
    .stepper-btn { width:20px; height:20px; background:#2d2d4e; border:1px solid #3b3b5c; border-radius:3px; color:#a78bfa; font-size:0.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; transition:background 0.1s; flex-shrink:0; }
    .stepper-btn:hover { background:#3b3b6e; }
    .stepper-btn:active { background:#4c3a8e; }

    /* Buttons */
    .btn { padding:5px 12px; border:none; border-radius:5px; cursor:pointer; font-family:inherit; font-size:0.76rem; font-weight:600; letter-spacing:0.5px; transition:all 0.15s; }
    .btn-secondary { background:#2d2d4e; color:#a78bfa; }
    .btn-secondary:hover { background:#3b3b6e; }
    .btn-primary { background:#7c3aed; color:#fff; }
    .btn-primary:hover { background:#6d28d9; }
    .btn-success { background:#065f46; color:#6ee7b7; }
    .btn-success:hover { background:#047857; }
    .btn-danger { background:#7f1d1d; color:#fca5a5; }
    .btn-danger:hover { background:#991b1b; }

    .btn-mark { background:#2d2d4e; color:#9ca3af; }
    .btn-mark:hover { background:#3b3b6e; }
    .btn-mark.active-col { background:#1d4ed8; color:#fff; }
    .btn-mark.active-row { background:#065f46; color:#6ee7b7; }

    #grid-status { font-size:0.72rem; color:#6ee7b7; background:#0a2a1e; padding:2px 8px; border-radius:4px; white-space:nowrap; }
    #canvas-info { font-size:0.68rem; color:#4b5563; margin-left:auto; }

    /* Canvas */
    #canvas-container { position:relative; overflow:auto; flex:1; min-height:200px; border:1px solid #2d2d4e; border-radius:6px; background:repeating-conic-gradient(#1e1e30 0% 25%,#181828 0% 50%) 0 0 / 16px 16px; }
    #main-canvas { display:block; }
    #grid-canvas { position:absolute; top:0; left:0; pointer-events:none; }
    #click-canvas { position:absolute; top:0; left:0; cursor:default; }
    #canvas-container.mode-col #click-canvas { cursor:col-resize; }
    #canvas-container.mode-row #click-canvas { cursor:row-resize; }

    /* Palette panel */
    #palette-panel { background:#1a1a2e; border-radius:10px; border:1px solid #2d2d4e; padding:12px; display:flex; flex-direction:column; gap:10px; }
    #palette-panel h3 { font-size:0.8rem; color:#a78bfa; letter-spacing:1px; text-transform:uppercase; }

    #tolerance-row { display:flex; align-items:center; gap:8px; background:#13132a; padding:6px 10px; border-radius:6px; border:1px solid #2d2d4e; }
    #tolerance-row label { font-size:0.72rem; color:#9ca3af; white-space:nowrap; }
    #tolerance-slider { flex:1; accent-color:#7c3aed; cursor:pointer; }
    #tolerance-val { font-size:0.72rem; color:#a78bfa; min-width:28px; text-align:right; }

    #color-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:3px; max-height:400px; }
    .color-row { display:flex; align-items:center; gap:7px; padding:4px 6px; border-radius:5px; transition:background 0.1s; }
    .color-row:hover { background:#23233a; }
    .color-swatch { width:24px; height:24px; border-radius:3px; border:1px solid rgba(255,255,255,0.15); flex-shrink:0; }
    .color-info { flex:1; min-width:0; }
    .color-hex { font-size:0.68rem; color:#9ca3af; }
    .color-meta { font-size:0.63rem; color:#6b6b8a; }
    .type-input { width:52px; background:#0f0f1a; border:1px solid #3b3b5c; border-radius:4px; color:#e0e0f0; padding:3px 5px; font-family:inherit; font-size:0.76rem; text-align:center; flex-shrink:0; }
    .type-input:focus { outline:none; border-color:#7c3aed; }
    .type-input.assigned { border-color:#4ade80; color:#4ade80; }
    #palette-hint { font-size:0.67rem; color:#6b6b8a; line-height:1.5; }

    /* Output */
    #output-panel { display:none; background:#1a1a2e; border-radius:10px; border:1px solid #2d2d4e; padding:12px; gap:10px; flex-direction:column; }
    #output-panel.visible { display:flex; }
    #output-toolbar { display:flex; align-items:center; gap:10px; }
    #output-toolbar h3 { font-size:0.8rem; color:#a78bfa; letter-spacing:1px; text-transform:uppercase; flex:1; }
    #output-stats { font-size:0.7rem; color:#6b6b8a; }
    #json-output { background:#0a0a14; border:1px solid #2d2d4e; border-radius:6px; color:#a5f3d0; font-family:inherit; font-size:0.7rem; padding:10px; resize:vertical; height:200px; width:100%; line-height:1.4; }

    @media (max-width:900px) {
      #workspace.visible { grid-template-columns:1fr; }
      #color-list { max-height:240px; }
    }
  </style>
</head>
<body>
<header>
  <h1>&#9632; ReadPixel</h1>
  <span>pixel art → level JSON</span>
</header>
<main>

  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*">
    <label for="file-input" style="cursor:pointer;display:block;">
      <p>&#128444;&#65039; Drop image here or click to upload</p>
      <small>PNG, JPG, BMP — pixel art</small>
    </label>
  </div>

  <!-- Workspace -->
  <div id="workspace">
    <div id="canvas-panel">

      <!-- Mode tabs -->
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="mode-tabs">
          <button class="tab-btn active" id="tab-mark">&#9998; Mark</button>
          <button class="tab-btn"        id="tab-pixel">&#9637; Pixel Grid</button>
        </div>
        <span id="grid-status">—</span>
        <span id="canvas-info"></span>
      </div>

      <!-- Mark controls -->
      <div id="mark-controls" class="ctrl-bar">
        <button class="btn btn-mark" id="btn-mode-col">&#9474; Cols</button>
        <button class="btn btn-mark" id="btn-mode-row">&#9135; Rows</button>
        <span class="sep">|</span>
        <button class="btn btn-secondary" id="btn-clear-col">Clear Cols</button>
        <button class="btn btn-secondary" id="btn-clear-row">Clear Rows</button>
        <button class="btn btn-danger"    id="btn-clear-all">Clear All</button>
      </div>

      <!-- Pixel grid controls -->
      <div id="pixel-controls" class="ctrl-bar" style="display:none;">
        <label>W:
          <div class="stepper">
            <button class="stepper-btn" data-target="px-w" data-delta="-0.5">−</button>
            <input type="number" id="px-w" min="0.5" step="0.5" value="10">
            <button class="stepper-btn" data-target="px-w" data-delta="0.5">+</button>
          </div>
        </label>
        <span class="sep">×</span>
        <label>H:
          <div class="stepper">
            <button class="stepper-btn" data-target="px-h" data-delta="-0.5">−</button>
            <input type="number" id="px-h" min="0.5" step="0.5" value="10">
            <button class="stepper-btn" data-target="px-h" data-delta="0.5">+</button>
          </div>
        </label>
        <span class="sep">|</span>
        <label>OX:
          <div class="stepper">
            <button class="stepper-btn" data-target="px-ox" data-delta="-0.5">−</button>
            <input type="number" id="px-ox" min="0" step="0.5" value="0">
            <button class="stepper-btn" data-target="px-ox" data-delta="0.5">+</button>
          </div>
        </label>
        <label>OY:
          <div class="stepper">
            <button class="stepper-btn" data-target="px-oy" data-delta="-0.5">−</button>
            <input type="number" id="px-oy" min="0" step="0.5" value="0">
            <button class="stepper-btn" data-target="px-oy" data-delta="0.5">+</button>
          </div>
        </label>
      </div>

      <!-- Canvas -->
      <div id="canvas-container">
        <canvas id="main-canvas"></canvas>
        <canvas id="grid-canvas"></canvas>
        <canvas id="click-canvas"></canvas>
      </div>
    </div>

    <!-- Palette panel -->
    <div id="palette-panel">
      <h3>Color Palette</h3>
      <div id="tolerance-row">
        <label>Tolerance:</label>
        <input type="range" id="tolerance-slider" min="0" max="100" value="15">
        <span id="tolerance-val">15</span>
      </div>
      <div id="color-list"></div>
      <p id="palette-hint">Select a mode and define the grid.</p>
      <button class="btn btn-primary" id="btn-generate" style="width:100%;">&#9654; Generate JSON</button>
    </div>
  </div>

  <!-- Output -->
  <div id="output-panel">
    <div id="output-toolbar">
      <h3>JSON Output</h3>
      <span id="output-stats"></span>
      <button class="btn btn-secondary" id="btn-copy">&#9997; Copy</button>
      <button class="btn btn-success"   id="btn-download">&#8659; Download</button>
    </div>
    <textarea id="json-output" readonly spellcheck="false"></textarea>
  </div>

</main>
<script>
'use strict';

// ============================================================
// AppState
// ============================================================
const AppState = {
  image: null, imageData: null,
  imgW: 0, imgH: 0,

  // mode: 'mark' | 'pixel'
  gridMode: 'mark',

  // Mark mode
  colMarks: [], rowMarks: [],
  markMode: 'none', // 'col' | 'row' | 'none'

  // Pixel mode
  blockW: 10, blockH: 10,
  offsetX: 0, offsetY: 0,

  tolerance: 15,
  colorMap: new Map(),
  cellColorMap: new Map(),
  typeMap: new Map(),
};

const SNAP = 6;

// ============================================================
// Utility
// ============================================================
function hexToRgb(h) { return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) }; }

// RGB Euclidean — used for clustering tolerance
function colorDist(a,b) { const A=hexToRgb(a),B=hexToRgb(b); return Math.sqrt((A.r-B.r)**2+(A.g-B.g)**2+(A.b-B.b)**2); }

// CIELAB Delta-E — perceptually accurate, used for palette matching
function rgbToLab(r,g,b) {
  // sRGB → linear
  let R=r/255, G=g/255, B=b/255;
  R = R>0.04045 ? Math.pow((R+0.055)/1.055,2.4) : R/12.92;
  G = G>0.04045 ? Math.pow((G+0.055)/1.055,2.4) : G/12.92;
  B = B>0.04045 ? Math.pow((B+0.055)/1.055,2.4) : B/12.92;
  // linear → XYZ (D65)
  const X=(R*0.4124+G*0.3576+B*0.1805)/0.95047;
  const Y=(R*0.2126+G*0.7152+B*0.0722)/1.00000;
  const Z=(R*0.0193+G*0.1192+B*0.9505)/1.08883;
  const f=v=>v>0.008856?Math.cbrt(v):(7.787*v+16/116);
  return { L:116*f(Y)-16, a:500*(f(X)-f(Y)), b:200*(f(Y)-f(Z)) };
}
function colorDistLab(hexA,hexB) {
  const A=hexToRgb(hexA), B=hexToRgb(hexB);
  const lA=rgbToLab(A.r,A.g,A.b), lB=rgbToLab(B.r,B.g,B.b);
  return Math.sqrt((lA.L-lB.L)**2+(lA.a-lB.a)**2+(lA.b-lB.b)**2);
}

// ============================================================
// Predefined palette (ETypeColor)
// ============================================================
const PALETTE = [
  { type: 0,  name: 'BLACK',  hex: '#000000' },
  { type: 1,  name: 'BLUE',   hex: '#1246A2' },
  { type: 2,  name: 'BROWN',  hex: '#8C4914' },
  { type: 3,  name: 'CYAN',   hex: '#45D8E9' },
  { type: 4,  name: 'GREEN',  hex: '#2DCA2D' },
  { type: 5,  name: 'ORANGE', hex: '#F88716' },
  { type: 6,  name: 'PINK',   hex: '#F380DE' },
  { type: 7,  name: 'PURPLE', hex: '#9738F1' },
  { type: 8,  name: 'RED',    hex: '#BB1416' },
  { type: 9,  name: 'WHITE',  hex: '#ffffff' },
  { type: 10, name: 'YELLOW', hex: '#FFE000' },
];

function nearestPalette(hex) {
  let best = PALETTE[0], bestDist = Infinity;
  for (const p of PALETTE) {
    const d = colorDistLab(hex, p.hex);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return { match: best, dist: Math.round(bestDist) };
}
function getPixelHex(x, y) {
  const {imageData,imgW,imgH} = AppState;
  x=Math.max(0,Math.min(imgW-1,Math.round(x))); y=Math.max(0,Math.min(imgH-1,Math.round(y)));
  const i=(y*imgW+x)*4, d=imageData.data;
  return '#'+[d[i],d[i+1],d[i+2]].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// Returns {cols, rows, getCellCenter(i,j)} for whichever mode is active
function getGridDef() {
  const { gridMode, colMarks, rowMarks, blockW, blockH, offsetX, offsetY, imgW, imgH } = AppState;
  if (gridMode === 'mark') {
    const cols = Math.max(0, colMarks.length - 1);
    const rows = Math.max(0, rowMarks.length - 1);
    return {
      cols, rows,
      getCellCenter: (i, j) => ({
        cx: (colMarks[i] + colMarks[i+1]) / 2,
        cy: (rowMarks[j] + rowMarks[j+1]) / 2,
      }),
    };
  } else {
    const cols = Math.floor((imgW - offsetX) / blockW);
    const rows = Math.floor((imgH - offsetY) / blockH);
    return {
      cols, rows,
      getCellCenter: (i, j) => ({
        cx: offsetX + i * blockW + blockW / 2,
        cy: offsetY + j * blockH + blockH / 2,
      }),
    };
  }
}

// ============================================================
// Image Loading
// ============================================================
function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) { alert('Invalid image.'); return; }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    AppState.image = img;
    AppState.imgW = img.naturalWidth;
    AppState.imgH = img.naturalHeight;
    AppState.colMarks = []; AppState.rowMarks = [];

    const c = document.createElement('canvas');
    c.width = AppState.imgW; c.height = AppState.imgH;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    try { AppState.imageData = ctx.getImageData(0,0,AppState.imgW,AppState.imgH); }
    catch(e) { alert('Cannot read pixel data.'); return; }
    URL.revokeObjectURL(url);

    ['main-canvas','grid-canvas','click-canvas'].forEach(id => {
      const el = document.getElementById(id);
      el.width = AppState.imgW; el.height = AppState.imgH;
    });
    document.getElementById('main-canvas').getContext('2d').drawImage(img, 0, 0);
    document.getElementById('workspace').classList.add('visible');
    document.getElementById('canvas-info').textContent = `${AppState.imgW}×${AppState.imgH}px`;
    refreshGrid();
  };
  img.onerror = () => alert('Failed to load image.');
  img.src = url;
}

// ============================================================
// Grid mode switch
// ============================================================
function setGridMode(m) {
  AppState.gridMode = m;
  document.getElementById('tab-mark').classList.toggle('active', m === 'mark');
  document.getElementById('tab-pixel').classList.toggle('active', m === 'pixel');
  document.getElementById('mark-controls').style.display  = m === 'mark'  ? '' : 'none';
  document.getElementById('pixel-controls').style.display = m === 'pixel' ? '' : 'none';
  // reset click cursor when switching to pixel
  if (m === 'pixel') { AppState.markMode = 'none'; updateMarkCursor(); }
  refreshGrid();
}

// ============================================================
// Mark mode (mark tab)
// ============================================================
function setMarkMode(m) {
  AppState.markMode = AppState.markMode === m ? 'none' : m;
  updateMarkCursor();
}
function updateMarkCursor() {
  const m = AppState.markMode;
  document.getElementById('btn-mode-col').className = 'btn btn-mark' + (m==='col' ? ' active-col' : '');
  document.getElementById('btn-mode-row').className = 'btn btn-mark' + (m==='row' ? ' active-row' : '');
  const cont = document.getElementById('canvas-container');
  cont.className = m === 'col' ? 'mode-col' : m === 'row' ? 'mode-row' : '';
}

function canvasCoords(e) {
  const canvas = document.getElementById('click-canvas');
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (AppState.imgW / rect.width),
    y: (e.clientY - rect.top)  * (AppState.imgH / rect.height),
  };
}

document.getElementById('click-canvas').addEventListener('click', e => {
  if (AppState.gridMode !== 'mark' || AppState.markMode === 'none' || !AppState.imgW) return;
  const {x, y} = canvasCoords(e);
  const { colMarks, rowMarks, markMode } = AppState;
  if (markMode === 'col') {
    const idx = colMarks.findIndex(m => Math.abs(m-x) <= SNAP);
    if (idx !== -1) colMarks.splice(idx, 1);
    else { colMarks.push(x); colMarks.sort((a,b)=>a-b); }
  } else {
    const idx = rowMarks.findIndex(m => Math.abs(m-y) <= SNAP);
    if (idx !== -1) rowMarks.splice(idx, 1);
    else { rowMarks.push(y); rowMarks.sort((a,b)=>a-b); }
  }
  refreshGrid();
});

document.getElementById('click-canvas').addEventListener('mousemove', e => {
  if (AppState.gridMode !== 'mark' || AppState.markMode === 'none' || !AppState.imgW) return;
  const {x, y} = canvasCoords(e);
  renderGridOverlay(AppState.markMode === 'col' ? x : null, AppState.markMode === 'row' ? y : null);
});
document.getElementById('click-canvas').addEventListener('mouseleave', () => {
  if (AppState.imgW) renderGridOverlay();
});

// ============================================================
// Refresh (overlay + sample) — called whenever grid changes
// ============================================================
function refreshGrid() {
  updateGridStatus();
  renderGridOverlay();
  sampleAndCluster();
}

function updateGridStatus() {
  const { cols, rows } = getGridDef();
  document.getElementById('grid-status').textContent =
    AppState.gridMode === 'mark'
      ? `${AppState.colMarks.length} col marks · ${AppState.rowMarks.length} row marks → ${cols}×${rows} cells`
      : `${cols}×${rows} cells  (${AppState.blockW}×${AppState.blockH}px/cell)`;
}

// ============================================================
// Grid Overlay
// ============================================================
function renderGridOverlay(hoverX = null, hoverY = null) {
  const { imgW, imgH, gridMode, colMarks, rowMarks, blockW, blockH, offsetX, offsetY } = AppState;
  const canvas = document.getElementById('grid-canvas');
  canvas.width = imgW; canvas.height = imgH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, imgW, imgH);

  if (gridMode === 'mark') {
    // Col lines (blue)
    ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
    colMarks.forEach(x => { ctx.beginPath(); ctx.moveTo(x+0.5,0); ctx.lineTo(x+0.5,imgH); ctx.stroke(); });
    // Row lines (green)
    ctx.strokeStyle = '#34d399';
    rowMarks.forEach(y => { ctx.beginPath(); ctx.moveTo(0,y+0.5); ctx.lineTo(imgW,y+0.5); ctx.stroke(); });
    // Hover preview
    ctx.setLineDash([2,4]); ctx.lineWidth = 1;
    if (hoverX !== null) { ctx.strokeStyle='rgba(56,189,248,0.6)'; ctx.beginPath(); ctx.moveTo(hoverX+0.5,0); ctx.lineTo(hoverX+0.5,imgH); ctx.stroke(); }
    if (hoverY !== null) { ctx.strokeStyle='rgba(52,211,153,0.6)'; ctx.beginPath(); ctx.moveTo(0,hoverY+0.5); ctx.lineTo(imgW,hoverY+0.5); ctx.stroke(); }
    ctx.setLineDash([]);
    // Mark dots
    ctx.fillStyle='rgba(96,165,250,0.9)';
    colMarks.forEach(x => { ctx.beginPath(); ctx.arc(x,6,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x,imgH-6,3,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle='rgba(52,211,153,0.9)';
    rowMarks.forEach(y => { ctx.beginPath(); ctx.arc(6,y,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(imgW-6,y,3,0,Math.PI*2); ctx.fill(); });
  } else {
    // Pixel grid: uniform rectangles
    const cols = Math.floor((imgW - offsetX) / blockW);
    const rows = Math.floor((imgH - offsetY) / blockH);
    ctx.strokeStyle = '#f472b6'; ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
    for (let i = 0; i <= cols; i++) {
      const x = Math.round(offsetX + i * blockW) + 0.5;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, imgH); ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
      const y = Math.round(offsetY + j * blockH) + 0.5;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(imgW, y); ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Sample dots (yellow) at cell centers — both modes
  const { cols, rows, getCellCenter } = getGridDef();
  if (cols > 0 && rows > 0) {
    ctx.fillStyle = 'rgba(255,255,0,0.65)';
    for (let j = 0; j < rows; j++)
      for (let i = 0; i < cols; i++) {
        const { cx, cy } = getCellCenter(i, j);
        ctx.beginPath(); ctx.arc(cx, cy, 1.5, 0, Math.PI*2); ctx.fill();
      }
  }
}

// ============================================================
// Color Sampling + Clustering
// ============================================================
function sampleAndCluster() {
  const { tolerance } = AppState;
  const { cols, rows, getCellCenter } = getGridDef();

  if (cols < 1 || rows < 1) {
    AppState.colorMap.clear(); AppState.cellColorMap.clear();
    renderPalette(); return;
  }

  const rawColors = new Map();
  const cellRaw = new Map();

  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      const { cx, cy } = getCellCenter(i, j);
      const hex = getPixelHex(cx, cy);
      if (!rawColors.has(hex)) rawColors.set(hex, { hex, count: 0 });
      rawColors.get(hex).count++;
      cellRaw.set(`${i},${j}`, hex);
    }
  }

  const threshold = (tolerance / 100) * 441;
  const uniqueColors = [...rawColors.values()].sort((a,b) => b.count - a.count);
  const groups = new Map();
  const exactToRep = new Map();

  for (const { hex } of uniqueColors) {
    let found = null;
    for (const [rep] of groups) { if (colorDist(hex, rep) <= threshold) { found = rep; break; } }
    if (found) { groups.get(found).mergedFrom.add(hex); exactToRep.set(hex, found); }
    else { groups.set(hex, { mergedFrom: new Set([hex]) }); exactToRep.set(hex, hex); }
  }

  AppState.colorMap.clear(); AppState.cellColorMap.clear();
  for (const [rep, g] of groups)
    AppState.colorMap.set(rep, { hex: rep, count: 0, cells: [], merged: g.mergedFrom.size });

  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      const rep = exactToRep.get(cellRaw.get(`${i},${j}`));
      AppState.colorMap.get(rep).count++;
      AppState.colorMap.get(rep).cells.push({ x:i, y:j });
      AppState.cellColorMap.set(`${i},${j}`, rep);
    }
  }

  const newTypeMap = new Map();
  for (const [rep] of AppState.colorMap)
    if (AppState.typeMap.has(rep)) newTypeMap.set(rep, AppState.typeMap.get(rep));
  AppState.typeMap = newTypeMap;

  renderPalette();
}

// ============================================================
// Palette UI
// ============================================================
function renderPalette() {
  const list = document.getElementById('color-list');
  list.innerHTML = '';
  const colors = [...AppState.colorMap.values()].sort((a,b) => b.count - a.count);

  for (const { hex, count, merged } of colors) {
    // Auto-match to nearest palette color
    const { match, dist } = nearestPalette(hex);
    // Auto-assign type if not yet set by user
    if (!AppState.typeMap.has(hex)) AppState.typeMap.set(hex, match.type);

    const row = document.createElement('div');
    row.className = 'color-row'; row.dataset.hex = hex;

    // Detected color swatch
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch'; swatch.style.backgroundColor = hex;

    // Info: hex + count
    const info = document.createElement('div');
    info.className = 'color-info';
    info.innerHTML = `<div class="color-hex">${hex}</div><div class="color-meta">×${count}${merged>1?` (${merged} shades)`:''}</div>`;

    // Matched palette indicator
    const matchEl = document.createElement('div');
    matchEl.style.cssText = 'display:flex;align-items:center;gap:4px;flex-shrink:0;';
    matchEl.innerHTML = `
      <div style="width:18px;height:18px;border-radius:3px;border:1px solid rgba(255,255,255,0.2);background:${match.hex};flex-shrink:0;" title="${match.name} ${match.hex}"></div>
      <span style="font-size:0.6rem;color:#6b6b8a;white-space:nowrap;">${match.name}<br>Δ${dist}</span>`;

    // Type input (pre-filled)
    const typeInput = document.createElement('input');
    typeInput.type = 'number'; typeInput.className = 'type-input'; typeInput.min = '0'; typeInput.placeholder = '0';
    const existing = AppState.typeMap.get(hex);
    if (existing) { typeInput.value = existing; typeInput.classList.add('assigned'); }
    typeInput.addEventListener('input', () => {
      const val = parseInt(typeInput.value, 10);
      if (!isNaN(val) && val > 0) { AppState.typeMap.set(hex, val); typeInput.classList.add('assigned'); }
      else { AppState.typeMap.delete(hex); typeInput.classList.remove('assigned'); }
    });

    row.appendChild(swatch); row.appendChild(info); row.appendChild(matchEl); row.appendChild(typeInput);
    list.appendChild(row);
  }

  const n = colors.length;
  document.getElementById('palette-hint').textContent = n
    ? `${n} colors auto-matched to palette. Adjust type numbers if needed.`
    : 'Define the grid to detect colors.';
}

// ============================================================
// JSON Generation
// ============================================================
function generateJSON() {
  const { cellColorMap, typeMap } = AppState;
  const { cols, rows } = getGridDef();
  if (cols < 1 || rows < 1) { alert('Grid is empty. Define columns and rows first.'); return; }

  const countColor = new Set([...typeMap.values()].filter(v=>v>0)).size;
  const cells = [];
  // y=0 is bottom-left → flip j so row j=rows-1 (bottom of image) → y=0
  for (let j = 0; j < rows; j++)
    for (let i = 0; i < cols; i++) {
      const hex = cellColorMap.get(`${i},${j}`);
      cells.push({ x: i, y: rows - 1 - j, type: (hex && typeMap.get(hex)) || 0 });
    }

  // colorMapping: use clean palette hex, not raw sampled hex
  const colorMapping = {};
  for (const [hex, typeNum] of typeMap) {
    if (typeNum > 0) {
      const palEntry = PALETTE.find(p => p.type === typeNum);
      colorMapping[typeNum] = palEntry ? palEntry.hex : hex;
    }
  }

  const sqrMagnitude = cols*cols + rows*rows;
  const output = {
    levelDataPixel: {
      gridSize: { x:cols, y:rows, magnitude:parseFloat(Math.sqrt(sqrMagnitude).toFixed(7)), sqrMagnitude },
      cells, countColor
    },
    colorMapping,
    levelDataCannon: Array.from({length:countColor},()=>[]),
    hammers:[], hardPieces:[], listLinkCannon:[], barriers:[], knittingPipes:[]
  };

  const jsonStr = JSON.stringify(output, null, 2);
  document.getElementById('json-output').value = jsonStr;
  const panel = document.getElementById('output-panel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior:'smooth', block:'start' });
  document.getElementById('output-stats').textContent =
    `${cells.length} cells · ${countColor} types · ${(jsonStr.length/1024).toFixed(1)} KB`;
}

// ============================================================
// Export
// ============================================================
function copyJSON() {
  const text = document.getElementById('json-output').value, btn = document.getElementById('btn-copy');
  if (!text) return;
  const done = () => { btn.textContent='✓ Copied!'; setTimeout(()=>btn.textContent='✏ Copy',2000); };
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(done).catch(()=>{document.getElementById('json-output').select();document.execCommand('copy');done();});
  else { document.getElementById('json-output').select(); document.execCommand('copy'); done(); }
}
function downloadJSON() {
  const text = document.getElementById('json-output').value;
  if (!text) return;
  const a = Object.assign(document.createElement('a'), { href:URL.createObjectURL(new Blob([text],{type:'application/json'})), download:'level_data.json' });
  a.click(); URL.revokeObjectURL(a.href);
}

// ============================================================
// Event Wiring
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Upload
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
  document.getElementById('file-input').addEventListener('change', e => loadFile(e.target.files[0]));

  // Mode tabs
  document.getElementById('tab-mark').addEventListener('click',  () => setGridMode('mark'));
  document.getElementById('tab-pixel').addEventListener('click', () => setGridMode('pixel'));

  // Mark controls
  document.getElementById('btn-mode-col').addEventListener('click', () => setMarkMode('col'));
  document.getElementById('btn-mode-row').addEventListener('click', () => setMarkMode('row'));
  document.getElementById('btn-clear-col').addEventListener('click', () => { AppState.colMarks=[]; refreshGrid(); });
  document.getElementById('btn-clear-row').addEventListener('click', () => { AppState.rowMarks=[]; refreshGrid(); });
  document.getElementById('btn-clear-all').addEventListener('click', () => { AppState.colMarks=[]; AppState.rowMarks=[]; refreshGrid(); });

  // Pixel grid controls
  function syncPixel() {
    AppState.blockW  = Math.max(0.5, parseFloat(document.getElementById('px-w').value)  || 10);
    AppState.blockH  = Math.max(0.5, parseFloat(document.getElementById('px-h').value)  || 10);
    AppState.offsetX = Math.max(0,   parseFloat(document.getElementById('px-ox').value) || 0);
    AppState.offsetY = Math.max(0,   parseFloat(document.getElementById('px-oy').value) || 0);
    if (AppState.imgW) refreshGrid();
  }
  ['px-w','px-h','px-ox','px-oy'].forEach(id => document.getElementById(id).addEventListener('input', syncPixel));

  document.querySelectorAll('#pixel-controls .stepper-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const min = parseFloat(input.min) || 0;
      input.value = parseFloat((Math.max(min, (parseFloat(input.value)||0) + parseFloat(btn.dataset.delta))).toFixed(4));
      syncPixel();
    });
  });

  // Tolerance
  const slider = document.getElementById('tolerance-slider');
  slider.addEventListener('input', () => {
    AppState.tolerance = parseInt(slider.value, 10);
    document.getElementById('tolerance-val').textContent = slider.value;
    if (AppState.imgW) sampleAndCluster();
  });

  // Generate + export
  document.getElementById('btn-generate').addEventListener('click', generateJSON);
  document.getElementById('btn-copy').addEventListener('click', copyJSON);
  document.getElementById('btn-download').addEventListener('click', downloadJSON);
});
</script>
